name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build and package
        shell: pwsh
        run: ./build.ps1
      - name: Archive portable build
        shell: pwsh
        run: Compress-Archive -Path artifacts/ProxyMonitor-portable/* -DestinationPath artifacts/ProxyMonitor-portable.zip
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            artifacts/ProxyMonitor-Setup-*.exe
            artifacts/ProxyMonitor-portable.zip
