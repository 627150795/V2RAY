name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Prepare pinned v2rayN dependency
        shell: pwsh
        run: ./setup-upstream.ps1
      - name: Build
        run: dotnet build ProxyMonitor.csproj -c Release
      - name: Self-test
        run: dotnet run --project ProxyMonitor.csproj -c Release -- --self-test

